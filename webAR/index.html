<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js - Tap to Measure Distance</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            z-index: 1000;
            max-width: 320px;
            line-height: 1.6;
        }
        
        #status {
            margin-top: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-weight: bold;
        }
        
        #distance-display {
            margin-top: 8px;
            padding: 8px;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            border-left: 3px solid #3b82f6;
        }
        
        .found {
            color: #4ade80;
        }
        
        .searching {
            color: #fbbf24;
        }
        
        .instruction {
            color: #60a5fa;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="info">
        <div>📱 AR Distance Measurement</div>
        <div id="status" class="searching">Status: Searching for HIRO marker...</div>
        <div class="instruction">👆 Tap the box to measure distance</div>
        <div class="instruction">🔵 Blue cubes persist in world space</div>
        <div id="distance-display">Distance: -- cm | Cubes: 0</div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; precision: medium;"
        raycaster="objects: .clickable"
        cursor="rayOrigin: mouse">
        
        <!-- Camera with raycaster -->
        <a-entity 
            id="camera" 
            camera 
            position="0 0 0"
            raycaster="objects: .clickable; far: 100">
        </a-entity>
        
        <!-- Container for spawned blue cubes (outside marker so they persist in world space) -->
        <a-entity id="spawned-cubes"></a-entity>
        
        <!-- HIRO Marker -->
        <a-marker preset="hiro" id="hiro-marker">
            <!-- Box spawned in front of the marker -->
            <a-box 
                id="target-box"
                class="clickable"
                position="0 0.5 -2"
                width="0.5"
                height="0.5"
                depth="0.5"
                color="#FF6B6B"
                material="opacity: 0.9"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
                animation__hover="property: scale; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200"
                animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
            </a-box>
            
            <!-- Visual indicator that box is clickable -->
            <a-ring
                position="0 0.5 -2"
                rotation="-90 0 0"
                radius-inner="0.4"
                radius-outer="0.5"
                color="#4ECDC4"
                opacity="0.6"
                material="transparent: true; side: double"
                animation="property: scale; to: 1.3 1.3 1.3; loop: true; dur: 1500; dir: alternate; easing: easeInOutQuad">
            </a-ring>
            
            <!-- Distance line (initially invisible) -->
            <a-entity id="distance-line" visible="false">
                <a-cylinder 
                    id="line-cylinder"
                    radius="0.01" 
                    height="1" 
                    color="#00FF00"
                    position="0 0 0">
                </a-cylinder>
            </a-entity>
            
            <!-- Marker center indicator -->
            <a-sphere 
                position="0 0 0" 
                radius="0.1" 
                color="#FFC107"
                opacity="0.8">
            </a-sphere>
        </a-marker>
    </a-scene>

    <script>
        // Wait for scene to load
        const sceneEl = document.querySelector('a-scene');
        const marker = document.querySelector('#hiro-marker');
        const targetBox = document.querySelector('#target-box');
        const camera = document.querySelector('#camera');
        const status = document.querySelector('#status');
        const distanceDisplay = document.querySelector('#distance-display');
        const distanceLine = document.querySelector('#distance-line');
        const lineCylinder = document.querySelector('#line-cylinder');
        const spawnedCubesContainer = document.querySelector('#spawned-cubes');
        
        let markerFound = false;
        let boxSpawned = false;
        let cubeSpawnCount = 0;

        // Track marker detection
        marker.addEventListener('markerFound', () => {
            markerFound = true;
            boxSpawned = true;
            status.textContent = 'Status: Marker Found! Box Spawned ✓';
            status.className = 'found';
            console.log('=================================');
            console.log('HIRO marker detected!');
            console.log('Box spawned at position:', targetBox.getAttribute('position'));
            console.log('=================================');
        });
        
        marker.addEventListener('markerLost', () => {
            markerFound = false;
            status.textContent = 'Status: Marker lost. Find marker again.';
            status.className = 'searching';
            distanceLine.setAttribute('visible', false);
            console.log('HIRO marker lost');
        });

        // Handle click/tap on the box
        targetBox.addEventListener('click', function(evt) {
            if (!markerFound) {
                console.log('Cannot measure - marker not visible');
                return;
            }

            console.log('\n--- RAYCAST MEASUREMENT ---');
            
            // Get world positions
            const cameraWorldPos = new THREE.Vector3();
            camera.object3D.getWorldPosition(cameraWorldPos);
            
            const boxWorldPos = new THREE.Vector3();
            targetBox.object3D.getWorldPosition(boxWorldPos);
            
            // Calculate distance using Three.js distance method
            const distance = cameraWorldPos.distanceTo(boxWorldPos);
            
            // Convert to centimeters for better readability
            const distanceCm = (distance * 100).toFixed(2);
            const distanceM = distance.toFixed(3);
            
            // Log detailed information
            console.log('Camera Position (world):', {
                x: cameraWorldPos.x.toFixed(3),
                y: cameraWorldPos.y.toFixed(3),
                z: cameraWorldPos.z.toFixed(3)
            });
            
            console.log('Box Position (world):', {
                x: boxWorldPos.x.toFixed(3),
                y: boxWorldPos.y.toFixed(3),
                z: boxWorldPos.z.toFixed(3)
            });
            
            console.log('Distance (meters):', distanceM + 'm');
            console.log('Distance (centimeters):', distanceCm + 'cm');
            console.log('Distance (feet):', (distance * 3.28084).toFixed(2) + 'ft');
            
            // Calculate direction vector
            const direction = new THREE.Vector3();
            direction.subVectors(boxWorldPos, cameraWorldPos);
            
            console.log('Direction Vector:', {
                x: direction.x.toFixed(3),
                y: direction.y.toFixed(3),
                z: direction.z.toFixed(3)
            });
            
            console.log('Timestamp:', new Date().toLocaleTimeString());
            console.log('-------------------------\n');
            
            // Update UI display
            distanceDisplay.innerHTML = `
                <strong>Distance:</strong> ${distanceCm} cm (${distanceM} m)<br>
                <strong>Taps:</strong> ${tapCount}<br>
                <strong>Cubes Spawned:</strong> ${cubeSpawnCount}
            `;
            
            // Visual feedback - flash the box
            targetBox.setAttribute('color', '#00FF00');
            setTimeout(() => {
                targetBox.setAttribute('color', '#FF6B6B');
            }, 200);
            
            // Draw a line from camera to box
            drawDistanceLine(cameraWorldPos, boxWorldPos, distance);
            
            // Spawn a blue cube at the box location (raycast hit point)
            spawnBlueCube(boxWorldPos);
            
            // Increment tap counter
            tapCount++;
        });
        
        let tapCount = 1;
        
        // Function to spawn a blue cube at the raycast hit location
        function spawnBlueCube(worldPosition) {
            cubeSpawnCount++;
            
            console.log('\n🔵 SPAWNING BLUE CUBE #' + cubeSpawnCount);
            console.log('World Position:', {
                x: worldPosition.x.toFixed(3),
                y: worldPosition.y.toFixed(3),
                z: worldPosition.z.toFixed(3)
            });
            console.log('Note: Cube is spawned in WORLD SPACE and will persist when marker is lost');
            
            // Create the blue cube directly in world space
            const blueCube = document.createElement('a-box');
            blueCube.setAttribute('width', '0.3');
            blueCube.setAttribute('height', '0.3');
            blueCube.setAttribute('depth', '0.3');
            blueCube.setAttribute('color', '#1E90FF'); // Dodger Blue
            
            // Set world position directly
            blueCube.object3D.position.copy(worldPosition);
            
            blueCube.setAttribute('material', 'opacity: 0.8; transparent: true');
            
            // Add spawn animation
            blueCube.setAttribute('animation', 'property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutElastic');
            blueCube.setAttribute('animation__rotate', 'property: rotation; to: 360 360 360; loop: true; dur: 8000; easing: linear');
            
            // Add glow effect with a sphere
            const glowSphere = document.createElement('a-sphere');
            glowSphere.setAttribute('radius', '0.25');
            glowSphere.setAttribute('color', '#00BFFF'); // Deep Sky Blue
            glowSphere.setAttribute('opacity', '0.3');
            glowSphere.setAttribute('material', 'transparent: true');
            glowSphere.setAttribute('animation', 'property: scale; to: 1.3 1.3 1.3; loop: true; dur: 1000; dir: alternate; easing: easeInOutSine');
            
            blueCube.appendChild(glowSphere);
            
            // Add label showing cube number
            const text = document.createElement('a-text');
            text.setAttribute('value', '#' + cubeSpawnCount);
            text.setAttribute('align', 'center');
            text.setAttribute('position', '0 0.3 0');
            text.setAttribute('scale', '0.5 0.5 0.5');
            text.setAttribute('color', '#FFFFFF');
            
            blueCube.appendChild(text);
            
            // Add to the world space container (not inside marker)
            spawnedCubesContainer.appendChild(blueCube);
            
            console.log('Blue cube #' + cubeSpawnCount + ' spawned successfully! ✓');
            console.log('Cube is anchored in world space - will remain visible even without marker');
            console.log('Total spawned cubes:', cubeSpawnCount);
            console.log('----------------------------\n');
        }
        
        // Function to draw a visual line between camera and box
        function drawDistanceLine(start, end, distance) {
            // Calculate midpoint
            const midpoint = new THREE.Vector3();
            midpoint.addVectors(start, end).multiplyScalar(0.5);
            
            // Calculate rotation to point from start to end
            const direction = new THREE.Vector3();
            direction.subVectors(end, start).normalize();
            
            // Convert to world space relative to marker
            const markerWorldPos = new THREE.Vector3();
            marker.object3D.getWorldPosition(markerWorldPos);
            
            const localMidpoint = new THREE.Vector3();
            localMidpoint.subVectors(midpoint, markerWorldPos);
            
            // Set line position and height
            lineCylinder.setAttribute('position', {
                x: localMidpoint.x,
                y: localMidpoint.y,
                z: localMidpoint.z
            });
            
            lineCylinder.setAttribute('height', distance);
            
            // Rotate to point toward box
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(
                new THREE.Vector3(0, 1, 0),
                direction
            );
            const euler = new THREE.Euler();
            euler.setFromQuaternion(quaternion);
            
            lineCylinder.object3D.rotation.copy(euler);
            
            // Show the line
            distanceLine.setAttribute('visible', true);
            
            // Hide line after 2 seconds
            setTimeout(() => {
                distanceLine.setAttribute('visible', false);
            }, 2000);
        }
        
        // Add cursor raycaster for better click detection
        sceneEl.addEventListener('loaded', () => {
            console.log('AR Scene loaded successfully');
            console.log('Instructions:');
            console.log('1. Point camera at HIRO marker');
            console.log('2. Tap the red box to measure distance');
            console.log('3. Distance will be logged in console');
        });
        
        // Add visual cursor feedback
        targetBox.addEventListener('mouseenter', function() {
            console.log('Hovering over box - tap to measure!');
        });
    </script>
</body>
</html>
