<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR.js Raycast Spawn Example</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  embedded
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
>
  
  <a-marker preset="hiro" id="hiroMarker">

    <!-- Target Box -->
    <a-box
      id="targetBox"
      position="0 0.5 0"
      depth="0.5"
      height="0.5"
      width="0.5"
      color="red">
    </a-box>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const cameraEl = document.querySelector("[camera]");
  const boxEl = document.querySelector("#targetBox");
  const markerEl = document.querySelector("#hiroMarker");

  const raycaster = new THREE.Raycaster();

  window.addEventListener("click", () => {

    console.log("raycast fired");

    const camera = cameraEl.object3D;
    const box = boxEl.object3D;

    // Forward direction from camera
    const direction = new THREE.Vector3(0, 0, -1);
    direction.applyQuaternion(camera.quaternion);

    raycaster.set(camera.position, direction);

    const intersects = raycaster.intersectObject(box, true);

    if (intersects.length > 0) {

      const hit = intersects[0];

      // 🔹 Store distance
      const distance = hit.distance;

      console.log("hit");
      console.log("stored distance:", distance.toFixed(3));

      // 🔹 Compute new position using stored distance
      const spawnPosition = camera.position.clone()
        .add(direction.clone().multiplyScalar(distance));

      // Convert to marker local space
      const localPosition = markerEl.object3D.worldToLocal(
        spawnPosition.clone()
      );

      // Create cylinder
      const cylinder = document.createElement("a-cylinder");

      cylinder.setAttribute("radius", 0.1);
      cylinder.setAttribute("height", 0.3);
      cylinder.setAttribute("color", "blue");

      cylinder.setAttribute(
        "position",
        `${localPosition.x} ${localPosition.y} ${localPosition.z}`
      );

      markerEl.appendChild(cylinder);
    }
  });

});
</script>

</body>
</html>
