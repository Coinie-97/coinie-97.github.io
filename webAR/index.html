<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR.js Raycast Spawn Example</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  embedded
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
>
  
  <a-marker preset="hiro" id="hiroMarker">

    <!-- Target Box -->
    <a-box
      id="targetBox"
      position="0 0.5 0"
      depth="0.5"
      height="0.5"
      width="0.5"
      color="red">
    </a-box>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const cameraEl = document.querySelector("[camera]");
  const boxEl = document.querySelector("#targetBox");
  const markerEl = document.querySelector("#hiroMarker");
  const sceneEl = document.querySelector("a-scene");

  const raycaster = new THREE.Raycaster();

  window.addEventListener("click", () => {

    console.log("raycast fired");

    const camera = cameraEl.object3D;
    const box = boxEl.object3D;

    // Forward direction from camera
    const direction = new THREE.Vector3(0, 0, -1);
    direction.applyQuaternion(camera.quaternion);

    raycaster.set(camera.position, direction);

    const intersects = raycaster.intersectObject(box, true);

    if (intersects.length > 0) {

      const hitPoint = intersects[0].point;

      console.log(
        "hit at:",
        {
          x: hitPoint.x.toFixed(3),
          y: hitPoint.y.toFixed(3),
          z: hitPoint.z.toFixed(3)
        }
      );

      // Convert world position into marker local space
      const localPoint = markerEl.object3D.worldToLocal(hitPoint.clone());

      // Create cylinder entity
      const cylinder = document.createElement("a-cylinder");

      cylinder.setAttribute("radius", 0.1);
      cylinder.setAttribute("height", 0.3);
      cylinder.setAttribute("color", "blue");

      cylinder.setAttribute(
        "position",
        `${localPoint.x} ${localPoint.y} ${localPoint.z}`
      );

      markerEl.appendChild(cylinder);
    }
  });

});
</script>

</body>
</html>
