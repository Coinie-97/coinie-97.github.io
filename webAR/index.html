<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Markerless AR Shooter</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #crosshair {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:40px; height:40px;
      border:2px solid white;
      border-radius:50%;
      z-index:10;
      display:none;
    }

    #hint {
      position:fixed;
      bottom:20px;
      width:100%;
      text-align:center;
      color:white;
      font-size:12px;
      z-index:10;
      display:none;
    }

    #startBtn {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      padding:18px 28px;
      font-size:20px;
      z-index:100;
      border:none;
      border-radius:8px;
      background:#222;
      color:white;
    }
  </style>
</head>

<body>

<button id="startBtn">Start AR</button>

<div id="crosshair"></div>
<div id="hint">Move phone to aim · Tap to shoot</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;">

  <!-- Camera (gyro will activate after permission) -->
  <a-entity id="camera" camera look-controls="enabled: false" position="0 1.6 0"></a-entity>

  <!-- World -->
  <a-entity id="world"></a-entity>

</a-scene>

<script>
// ─────────────────────────────
// START BUTTON + PERMISSION
// ─────────────────────────────
const btn = document.getElementById("startBtn");
const crosshair = document.getElementById("crosshair");
const hint = document.getElementById("hint");
const camera = document.getElementById("camera");

btn.addEventListener("click", async () => {

  // iOS permission request
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== "granted") {
        alert("Motion permission denied");
        return;
      }
    } catch (e) {
      alert("Permission error");
      return;
    }
  }

  // enable camera controls AFTER permission
  camera.setAttribute("look-controls", "enabled: true");

  // show UI
  btn.style.display = "none";
  crosshair.style.display = "block";
  hint.style.display = "block";

  startGame();
});

// ─────────────────────────────
// GAME LOGIC
// ─────────────────────────────
const world = document.getElementById("world");
let boxes = [];

// spawn boxes in front of player
function spawnBox(){
  const box = document.createElement("a-box");

  const angle = (Math.random() - 0.5) * Math.PI;
  const dist  = 3 + Math.random() * 3;

  const x = Math.sin(angle) * dist;
  const z = -Math.cos(angle) * dist;
  const y = 1 + Math.random() * 1.5;

  box.setAttribute("position", `${x} ${y} ${z}`);
  box.setAttribute("depth", "0.4");
  box.setAttribute("height", "0.4");
  box.setAttribute("width", "0.4");
  box.setAttribute("color", "#666");

  world.appendChild(box);

  boxes.push({
    el: box,
    vx: (Math.random()-0.5)*0.01,
    vy: (Math.random()-0.5)*0.01,
    vz: 0.01 + Math.random()*0.01,
    alive: true
  });
}

// movement loop
function update(){
  requestAnimationFrame(update);

  boxes.forEach((b, i)=>{
    if(!b.alive) return;

    const pos = b.el.object3D.position;

    pos.x += b.vx;
    pos.y += b.vy;
    pos.z += b.vz;

    // remove if too close
    if(pos.z > 1){
      world.removeChild(b.el);
      boxes.splice(i,1);
    }
  });
}

// shooting (real raycast)
function shoot(){
  const raycaster = new THREE.Raycaster();

  const camObj = camera.object3D;

  const origin = new THREE.Vector3();
  camObj.getWorldPosition(origin);

  const direction = new THREE.Vector3(0,0,-1);
  direction.applyQuaternion(camObj.quaternion);

  raycaster.set(origin, direction);

  const intersects = raycaster.intersectObjects(
    boxes.map(b=>b.el.object3D),
    true
  );

  if(intersects.length > 0){
    const hit = intersects[0].object.el;

    world.removeChild(hit);
    boxes = boxes.filter(b => b.el !== hit);
  }
}

// input
document.addEventListener("click", shoot);
document.addEventListener("touchstart", e=>{
  e.preventDefault();
  shoot();
},{passive:false});

// start game loop
function startGame(){
  setInterval(()=>{
    if(boxes.length < 6) spawnBox();
  }, 1500);

  update();
}

</script>

</body>
</html>
