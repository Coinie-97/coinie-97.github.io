<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Markerless AR Shooter</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #crosshair {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:40px; height:40px;
      border:2px solid white;
      border-radius:50%;
      z-index:10;
    }

    #hint {
      position:fixed;
      bottom:20px;
      width:100%;
      text-align:center;
      color:white;
      font-size:12px;
      z-index:10;
    }
  </style>
</head>

<body>

<div id="crosshair"></div>
<div id="hint">Move phone to aim · Tap to shoot</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;">

  <!-- Camera (uses gyro automatically) -->
  <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

  <!-- World container -->
  <a-entity id="world"></a-entity>

</a-scene>

<script>
// ─────────────────────────────
// WORLD SETUP
// ─────────────────────────────
const world = document.getElementById("world");
const camera = document.getElementById("camera");

let boxes = [];

// spawn box in front of camera
function spawnBox(){
  const box = document.createElement("a-box");

  const angle = (Math.random() - 0.5) * Math.PI; // spread horizontally
  const dist  = 3 + Math.random() * 3;

  const x = Math.sin(angle) * dist;
  const z = -Math.cos(angle) * dist;
  const y = 1 + Math.random() * 1.5;

  box.setAttribute("position", `${x} ${y} ${z}`);
  box.setAttribute("depth", "0.4");
  box.setAttribute("height", "0.4");
  box.setAttribute("width", "0.4");
  box.setAttribute("color", "#666");

  world.appendChild(box);

  boxes.push({
    el: box,
    vx: (Math.random()-0.5)*0.01,
    vy: (Math.random()-0.5)*0.01,
    vz: 0.01 + Math.random()*0.01,
    alive: true
  });
}

// spawn loop
setInterval(()=>{
  if(boxes.length < 6) spawnBox();
}, 1500);

// ─────────────────────────────
// UPDATE LOOP (movement)
// ─────────────────────────────
function update(){
  requestAnimationFrame(update);

  boxes.forEach((b, i)=>{
    if(!b.alive) return;

    const pos = b.el.object3D.position;

    // move toward player
    pos.z += b.vz;
    pos.x += b.vx;
    pos.y += b.vy;

    // simple bounds
    if(pos.z > 1){
      world.removeChild(b.el);
      boxes.splice(i,1);
    }
  });
}

update();

// ─────────────────────────────
// SHOOTING (TRUE 3D RAYCAST)
// ─────────────────────────────
function shoot(){
  const raycaster = new THREE.Raycaster();

  const camObj = camera.object3D;

  const origin = new THREE.Vector3();
  camObj.getWorldPosition(origin);

  const direction = new THREE.Vector3(0,0,-1);
  direction.applyQuaternion(camObj.quaternion);

  raycaster.set(origin, direction);

  const intersects = raycaster.intersectObjects(
    boxes.map(b=>b.el.object3D),
    true
  );

  if(intersects.length > 0){
    const hit = intersects[0].object.el;

    world.removeChild(hit);
    boxes = boxes.filter(b => b.el !== hit);
  }
}

// input
document.addEventListener("click", shoot);
document.addEventListener("touchstart", e=>{
  e.preventDefault();
  shoot();
},{passive:false});

</script>

</body>
</html>
