<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR.js Raycast Example</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  embedded
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
>
  
  <!-- HIRO Marker -->
  <a-marker preset="hiro" id="hiroMarker">

    <!-- Box that appears on marker -->
    <a-box
      id="targetBox"
      position="0 0.5 0"
      depth="0.5"
      height="0.5"
      width="0.5"
      color="red">
    </a-box>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const sceneEl = document.querySelector("a-scene");
  const cameraEl = document.querySelector("[camera]");
  const boxEl = document.querySelector("#targetBox");

  const raycaster = new THREE.Raycaster();

  window.addEventListener("click", () => {

    console.log("raycast fired");

    const camera = cameraEl.object3D;
    const box = boxEl.object3D;

    // Direction straight forward from camera
    const direction = new THREE.Vector3(0, 0, -1);
    direction.applyQuaternion(camera.quaternion);

    raycaster.set(camera.position, direction);

    const intersects = raycaster.intersectObject(box, true);

    if (intersects.length > 0) {

      const worldPosition = new THREE.Vector3();
      box.getWorldPosition(worldPosition);

      console.log(
        "hit",
        "box world coordinates:",
        {
          x: worldPosition.x.toFixed(3),
          y: worldPosition.y.toFixed(3),
          z: worldPosition.z.toFixed(3)
        }
      );
    }
  });

});
</script>

</body>
</html>
